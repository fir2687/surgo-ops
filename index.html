<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Surgo Ops</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f4f4f4;min-height:100vh;display:flex;flex-direction:column}
  header{background:#000;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
  .header-left{display:flex;align-items:center;gap:10px;text-decoration:none}
  .header-left img{height:32px;width:auto}
  .header-left span{color:#fff;font-size:15px;font-weight:700;letter-spacing:0.01em}
  .ops-tag{font-size:10px;color:#555;letter-spacing:0.1em;text-transform:uppercase}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px}
  .greeting{font-size:13px;color:#888;margin-bottom:8px;letter-spacing:0.04em}
  h1{font-size:20px;font-weight:600;color:#111;margin-bottom:6px;text-align:center}
  .sub{font-size:13px;color:#999;margin-bottom:32px;text-align:center}
  .date-badge{font-size:11px;color:#aaa;margin-bottom:32px}
  .site-btn{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:380px;background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:18px 20px;margin-bottom:12px;text-decoration:none;cursor:pointer;transition:border-color 0.15s,transform 0.1s}
  .site-btn:hover{border-color:#000;transform:translateY(-1px)}
  .site-btn:active{transform:scale(0.99)}
  .btn-left{display:flex;align-items:center;gap:14px}
  .btn-icon{width:42px;height:42px;border-radius:10px;background:#111;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .btn-name{font-size:15px;font-weight:600;color:#111;display:block;margin-bottom:3px}
  .btn-addr{font-size:12px;color:#888}
  .btn-arrow{font-size:20px;color:#ccc}
  .divider{width:100%;max-width:380px;display:flex;align-items:center;gap:12px;margin:4px 0 16px}
  .divider-line{flex:1;height:1px;background:#e5e5e5}
  .divider-text{font-size:11px;color:#ccc}
  .manager-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:380px;background:transparent;border:1px solid #ddd;border-radius:12px;padding:14px 22px;text-decoration:none;cursor:pointer;transition:background 0.15s}
  .manager-btn:hover{background:#eee}
  .manager-btn span{font-size:13px;color:#666;font-weight:500}
  footer{padding:20px;text-align:center;font-size:11px;color:#ccc;letter-spacing:0.04em}
</style>
</head>
<body>

<header>
  <a href="index.html" class="header-left">
    <img src="surgo-logo.jpg" alt="Surgo Asset Partners"/>
    <span>Surgo Asset Partners</span>
  </a>
  <span class="ops-tag">OPS PLATFORM</span>
</header>

<main>
  <div class="greeting" id="greeting">Good day</div>
  <h1>Daily Shift Report</h1>
  <p class="sub">Select your site for today</p>
  <div class="date-badge" id="dateBadge"></div>

  <a href="tsc.html" class="site-btn">
    <div class="btn-left">
      <div class="btn-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <div>
        <span class="btn-name">Tee Side Chalet</span>
        <span class="btn-addr">125 Pasir Ris Road · TSC</span>
      </div>
    </div>
    <span class="btn-arrow">›</span>
  </a>

  <a href="sas.html" class="site-btn">
    <div class="btn-left">
      <div class="btn-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="12,2 22,8 22,22 2,22 2,8" stroke="white" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
          <rect x="4.5" y="9.5" width="3" height="2.5" rx="0.4" fill="white"/>
          <rect x="10.5" y="9.5" width="3" height="2.5" rx="0.4" fill="white"/>
          <rect x="16.5" y="9.5" width="3" height="2.5" rx="0.4" fill="white"/>
          <rect x="4.5" y="13.5" width="3" height="2.5" rx="0.4" fill="white"/>
          <rect x="10.5" y="13.5" width="3" height="2.5" rx="0.4" fill="white"/>
          <rect x="16.5" y="13.5" width="3" height="2.5" rx="0.4" fill="white"/>
          <rect x="4.5" y="17.5" width="3" height="2.5" rx="0.4" fill="white"/>
          <rect x="10.5" y="17.5" width="3" height="2.5" rx="0.4" fill="white"/>
          <rect x="16.5" y="17.5" width="3" height="2.5" rx="0.4" fill="white"/>
        </svg>
      </div>
      <div>
        <span class="btn-name">SAS Healthcare Dorm</span>
        <span class="btn-addr">130 Hougang Ave 1 · SAS</span>
      </div>
    </div>
    <span class="btn-arrow">›</span>
  </a>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">OR</div>
    <div class="divider-line"></div>
  </div>

  <a href="dashboard.html" class="manager-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
    </svg>
    <span>Manager Dashboard</span>
  </a>
</main>

<footer>Surgo Asset Partners · Internal Use Only</footer>

<script>
  const d = new Date();
  document.getElementById('dateBadge').textContent = d.toLocaleDateString('en-SG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const h = d.getHours();
  document.getElementById('greeting').textContent = h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening';
</script>

</body>
</html>
